name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

      - name: Build app-image
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\package-windows.ps1 -Type app-image

      - name: Install WiX
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\install-wix.ps1

      - name: Build MSI
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\package-windows.ps1 -Type msi

      - name: Build EXE
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\package-windows.ps1 -Type exe

      - name: Zip app-image
        shell: powershell
        run: |
          Compress-Archive -Path .\dist\DataLens -DestinationPath .\dist\DataLens-app-image.zip -Force

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/datalens-0.1.0-SNAPSHOT-fat.jar
            dist/DataLens-app-image.zip
            dist/DataLens-0.1.0.msi
            dist/DataLens-0.1.0.exe
          generate_release_notes: true
