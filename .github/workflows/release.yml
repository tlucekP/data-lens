name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

      - name: Verify packaging environment
        shell: powershell
        run: |
          Write-Host "JAVA_HOME=$env:JAVA_HOME"
          Get-Command java | Format-List Source
          Get-Command mvn | Format-List Source
          Get-ChildItem .\target | Select-Object Name,Length

      - name: Build app-image
        shell: powershell
        run: |
          $temp = Join-Path $PWD '.jpackage-temp\app-image'
          if (Test-Path $temp) { Remove-Item -Recurse -Force $temp }
          if (Test-Path '.\dist\DataLens') { Remove-Item -Recurse -Force '.\dist\DataLens' }
          New-Item -ItemType Directory -Force -Path '.\dist', $temp | Out-Null
          & "$env:JAVA_HOME\bin\jpackage.exe" `
            --type app-image `
            --name DataLens `
            --dest dist `
            --temp $temp `
            --input target `
            --main-jar datalens-0.1.0-SNAPSHOT-fat.jar `
            --main-class com.datalens.app.MainApp `
            --app-version 0.1.0 `
            --vendor DataLens `
            --verbose

      - name: Install WiX
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\install-wix.ps1

      - name: Build MSI
        shell: powershell
        run: |
          $wix = Resolve-Path '.\.tools\wix'
          $env:DATALENS_WIX_REAL_LIGHT = Join-Path $wix 'light-real.exe'
          $env:DATALENS_WIX_LIGHT_EXTRA = '-sval'
          $env:PATH = "$wix;$env:PATH"
          $temp = Join-Path $PWD '.jpackage-temp\msi'
          if (Test-Path $temp) { Remove-Item -Recurse -Force $temp }
          if (Test-Path '.\dist\DataLens-0.1.0.msi') { Remove-Item -Force '.\dist\DataLens-0.1.0.msi' }
          New-Item -ItemType Directory -Force -Path $temp | Out-Null
          & "$env:JAVA_HOME\bin\jpackage.exe" `
            --type msi `
            --name DataLens `
            --dest dist `
            --temp $temp `
            --input target `
            --main-jar datalens-0.1.0-SNAPSHOT-fat.jar `
            --main-class com.datalens.app.MainApp `
            --app-version 0.1.0 `
            --vendor DataLens `
            --win-shortcut `
            --win-dir-chooser `
            --verbose

      - name: Build EXE
        shell: powershell
        run: |
          $wix = Resolve-Path '.\.tools\wix'
          $env:DATALENS_WIX_REAL_LIGHT = Join-Path $wix 'light-real.exe'
          $env:DATALENS_WIX_LIGHT_EXTRA = '-sval'
          $env:PATH = "$wix;$env:PATH"
          $temp = Join-Path $PWD '.jpackage-temp\exe'
          if (Test-Path $temp) { Remove-Item -Recurse -Force $temp }
          if (Test-Path '.\dist\DataLens-0.1.0.exe') { Remove-Item -Force '.\dist\DataLens-0.1.0.exe' }
          New-Item -ItemType Directory -Force -Path $temp | Out-Null
          & "$env:JAVA_HOME\bin\jpackage.exe" `
            --type exe `
            --name DataLens `
            --dest dist `
            --temp $temp `
            --input target `
            --main-jar datalens-0.1.0-SNAPSHOT-fat.jar `
            --main-class com.datalens.app.MainApp `
            --app-version 0.1.0 `
            --vendor DataLens `
            --win-shortcut `
            --win-dir-chooser `
            --verbose

      - name: Zip app-image
        shell: powershell
        run: |
          Compress-Archive -Path .\dist\DataLens -DestinationPath .\dist\DataLens-app-image.zip -Force

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/datalens-0.1.0-SNAPSHOT-fat.jar
            dist/DataLens-app-image.zip
            dist/DataLens-0.1.0.msi
            dist/DataLens-0.1.0.exe
          generate_release_notes: true
